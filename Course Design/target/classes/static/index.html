<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>社交网络紧密度中心性</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        #chart { width: 100%; height: 600px; border: 1px solid #ddd; margin-top: 20px; }
        .toolbar { margin: 12px 0; }
        .input-section { margin: 20px 0; }
        .input-section label { display: block; margin-bottom: 8px; font-weight: bold; }
        #text-input { width: 100%; height: 150px; padding: 8px; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; }
        #btn-submit { margin-top: 10px; padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #btn-submit:hover { background-color: #45a049; }
        .example-text { color: #666; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="toolbar">
    <input type="file" id="file-input" accept=".txt" />
    <button id="btn-upload">上传并分析</button>
    <span id="best-node" style="margin-left:16px;color:#c00;"></span>
</div>

<div class="input-section">
    <label for="text-input">动态输入数据（每行两个数字，用空格分隔，表示两个节点之间有边连接）：</label>
    <textarea id="text-input" placeholder="例如：&#10;1 2&#10;2 3&#10;3 4&#10;1 3&#10;2 4"></textarea>
    <div class="example-text">示例格式：每行输入两个数字，如 "1 2" 表示节点1和节点2之间有边连接</div>
    <button id="btn-submit">提交并分析</button>
</div>

<div id="chart"></div>

<script>
    const chart = echarts.init(document.getElementById('chart'));

    function render(result) {
        const { nodes, links, bestVertex } = result;
        document.getElementById('best-node').innerText =
            bestVertex != null ? `最重要节点：${bestVertex}` : '最重要节点：无';

        const option = {
            title: { text: '社交网络紧密度中心性' },
            tooltip: {},
            series: [{
                type: 'graph',
                layout: 'force',
                roam: true,
                label: { show: true },
                force: { repulsion: 200 },
                data: nodes,
                links: links
            }]
        };
        chart.setOption(option);
    }

    document.getElementById('btn-upload').onclick = async () => {
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files.length) {
            alert('请选择一个文本文件，每行格式：u v');
            return;
        }
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        try {
            const resp = await axios.post('/graph/analyzeFromFile', formData, {
                headers: { 'Content-Type': 'multipart/form-data' }
            });
            render(resp.data);
        } catch (error) {
            alert('分析失败：' + (error.response?.data?.message || error.message));
        }
    };

    document.getElementById('btn-submit').onclick = async () => {
        const textInput = document.getElementById('text-input');
        const text = textInput.value.trim();
        if (!text) {
            alert('请输入数据，每行格式：u v');
            return;
        }
        try {
            const resp = await axios.post('/graph/analyzeFromText', {
                data: text
            }, {
                headers: { 'Content-Type': 'application/json' }
            });
            render(resp.data);
        } catch (error) {
            alert('分析失败：' + (error.response?.data?.message || error.message));
        }
    };
</script>
</body>
</html>
